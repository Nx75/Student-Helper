<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nx75</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<!--CSS-->
<link rel="stylesheet" href="Clock/clock.css">
<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="TODO/todo.css">
<link rel="stylesheet" href="Pomodoro/pomodoro.css">
<link rel="stylesheet" href="assets/css/music_player.css">
<link rel="stylesheet" href="assets/css/weather.css">
<link rel="stylesheet" href="notes/notes.css">

<body>

    <div class="nav-bar">
        <div class="clock">
            00:00:00
        </div>
        <script>
            function updateClock(){
                const clock = document.querySelector('.clock');
                const now = new Date();

                let hours = now.getHours();
                let minutes = now.getMinutes();
                let seconds = now.getSeconds();

                hours = hours.toString().padStart(2, '0');
                minutes = minutes.toString().padStart(2, '0');
                seconds = seconds.toString().padStart(2, '0');

                clock.textContent = `${hours}:${minutes}:${seconds}`;
            }
            updateClock();
            setInterval(updateClock, 1000);
        </script>
    </div>

    <!-- DESKTOP -->
    <div id="desktop">
        <div id="clock-icon"><i class="fa-solid fa-clock"></i><label>Clock</label></div>
        <div id="todo-icon"><i class="fa-solid fa-clipboard-list"></i><label>TODO</label></div>
        <div id="pomodoro-icon"><i class="fa-solid fa-hourglass-end"></i><label>Pomodoro</label></div>
        <div id="notes-icon"><i class="fa-solid fa-note-sticky"></i><label>Notes</label></div>
    </div>

    <!--Weather Widget-->
    <div class="weather">
        <div class="weather-container">
            <h1>Weather</h1>

            <div class="weather-title" id="weatherTitle">
                City
            </div>

            <div class="weather-condition">
                <img id="weatherIcon" src="" alt="">

                <div class="temp" id="temperature">
                    00°C
                </div>

                <div class="condition" id="condition">
                    Condition
                </div>
            </div>
        </div>
    </div>

    <!--Music Player -->
    <div class="audio-player">

        <div class="audio-container">
            <h1>Music Player</h1>
            <div class="audio-title" id="songTitle">
                No song loaded
            </div>

            <div class="audio-row">
                <label for="songUpload" class="upload-btn">+ Add Music</label>
                <input type="file" id="songUpload" accept="audio/*" multiple>
            </div>

            <audio id="audioPlayer"></audio>

            <div class="audio-progress">
                <input type="range" id="progressBar" value="0" min="0" max="100">
            </div>

            <div class="audio-controls">
                <button id="prevBtn"><i class="fa-solid fa-backward"></i></button>
                <button id="playPauseBtn"><i class="fa-solid fa-play"></i></button>
                <button id="nextBtn"><i class="fa-solid fa-forward"></i></button>
            </div>

            <div class="audio-playlist" id="playlist"></div>
        </div>
        <!--Scripts-->
        <script src="assets/scripts/weather.js"></script>
        <script src="assets/scripts/music_player.js"></script>
        <script src="Clock/clock.js"></script>
        <script src="Pomodoro/pomodoro.js"></script>
        <script src="TODO/todo.js"></script>
        <script src="notes/notes.js"></script>
        <script src="assets/scripts/main.js"></script>

</body>

</html>
