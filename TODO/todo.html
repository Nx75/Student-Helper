<template id="todo-template">
    <div class="todo-window" id="desktop-window">
        <div class="window-header">TODO List</div>

        <div class="window-body">
            <div id="todo-container">
                <div id="header">
                    <h1>Not To-Do List</h1>
                </div>

                <div id="todo-form">
                    <input type="text" id="input-box" placeholder="Add something to avoid..." />
                    <button id="input-button" onclick="addTask()">Add</button>
                </div>

                <h2>Avoid List</h2>
                <ul id="list-container"></ul>

                <hr />

                <div class="counter-container">
                    <div id="task-counters">
                        Did it :( <span id="completed-counter">0</span> |
                        Avoided :) <span id="uncompleted-counter">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
