<template id="pomodoro-template">
    <div class="pomodoro-window" id="desktop-window">
        <div class="window-header">Pomodoro Timer</div>

        <div class="window-body">
            <div class="container">
                <h1>Pomodoro Timer</h1>

                <div class="row">
                    <label>Work (min):</label>
                    <input type="number" id="workTime" value="25" min="1">
                </div>

                <div class="row">
                    <label>Break (min):</label>
                    <input type="number" id="breakTime" value="5" min="1">
                </div>

                <h2 id="timer">25:00</h2>

                <div class="buttons">
                    <button id="start">Start</button>
                    <button id="pause">Pause</button>
                    <button id="reset">Reset</button>
                </div>

                <p id="mode">Mode: Work</p>
                <p id="sessions">Sessions: 0</p>
            </div>
        </div>
    </div>
</template>
