<template id="clock-template">
    <div class="clock-window" id="desktop-window">
        <div class="window-header">Clock</div>

        <div class="window-body">
            <div class="card">

                <div class="brand">
                    <div class="logo">Nx75</div>
                    <div>
                        <div class="title">Clock</div>
                        <div class="subtitle">12 / 24 Hour</div>
                    </div>
                </div>

                <div class="toggle-button">
                    <div class="btn-active" id="btn-12">12 Hours</div>
                    <div id="btn-24">24 Hours</div>
                </div>

                <div class="time-wrap">
                    <div class="time" id="time">00:00:00</div>
                    <div class="abbreviations" id="abbreviations">AM</div>
                </div>

                <div class="info">
                    <div id="date"></div>
                    <div class="day" id="day"></div>
                </div>

            </div>
        </div>
    </div>
</template>
